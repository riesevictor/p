<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webmulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        #app {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }

        #game {
            width: 100%;
            height: 100%;
        }

        #loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.92);
            z-index: 10;
        }

        #loadButton {
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main id="app">
        <div id="game"></div>
        <div id="loader">
            <button id="loadButton">Load ROM</button>
            <input type="file" id="romInput" hidden>
        </div>
    </main>

    <script>
        const romInput = document.getElementById('romInput');
        const loadButton = document.getElementById('loadButton');
        const loader = document.getElementById('loader');

        const coreByExtension = {
            n64: 'n64',
            z64: 'n64',
            v64: 'n64',
            gb: 'gb',
            gbc: 'gb',
            gba: 'gba',
            nds: 'nds',
            nes: 'nes',
            sfc: 'snes',
            smc: 'snes',
            snes: 'snes',
            bin: 'segaMD',
            gen: 'segaMD',
            md: 'segaMD',
            sms: 'segaMS',
            gg: 'segaGG',
            pce: 'pce',
            vb: 'vb',
            lynx: 'lynx',
            jag: 'jaguar',
            a26: 'atari2600',
            a78: 'atari7800',
            cue: 'psx',
            iso: 'psx',
            chd: 'psx'
        };

        loadButton.addEventListener('click', () => romInput.click());

        romInput.addEventListener('change', () => {
            const file = romInput.files[0];
            if (!file) return;

            const extension = file.name.split('.').pop().toLowerCase();
            const core = coreByExtension[extension] || 'gba';
            const url = URL.createObjectURL(file);

            loader.style.display = 'none';

            window.EJS_player = '#game';
            window.EJS_gameName = file.name;
            window.EJS_gameUrl = url;
            window.EJS_core = core;
            window.EJS_pathtodata = 'https://rawcdn.githack.com/EmulatorJS/EmulatorJS/main/data/';
            window.EJS_startOnLoaded = true;

            const script = document.createElement('script');
            script.src = 'https://rawcdn.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js';
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
